<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
    <title>Visual CSS Clip-Path Generator</title>
    <meta property="og:title" content="CSS Clip Path Generator - Project Toolsuite" />
    <meta property="og:description" content="Generate custom CSS clip-path shapes visually and copy the code instantly." />
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CSS Clip Path Generator - Project Toolsuite" />
    <meta name="twitter:description" content="Generate custom CSS clip-path shapes visually and copy the code instantly." />
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    <style>

        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007acc;
            --handle-color: #ff4081;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
        }

        /* Sidebar Controls */
        .sidebar {
            width: 320px;
            background: var(--bg);
            border-right: 2px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.08);
            z-index: 10;
        }

        h2 { margin-top: 0; font-size: 1.2rem; }

        .dark-mode-toggle {
            margin-top: 12px;
            padding: 8px 12px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .dark-mode-toggle:hover {
            background: var(--text);
            color: var(--bg);
        }

        .code-box {
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            word-break: break-all;
            position: relative;
            background: var(--bg);
            border: 2px solid var(--border);
            color: #007acc;
        }

        .presets {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            transition: all 0.25s ease;
        }

        button:hover {
            transform: translateY(-2px);
            background: var(--accent-color);
            color: white;
        }

        button.active {
            background: var(--accent-color);
            color: white;
        }

        .copy-btn {
            margin-top: 10px;
            width: 100%;
            background-color: var(--accent-color);
            font-weight: bold;
            padding: 10px;
        }

        /* Main Canvas Area */
        .workspace {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }

        .demo-box {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* This is where the clip-path is applied */
        }

        /* Draggable Handles */
        .handle {
            width: 16px;
            height: 16px;
            background-color: var(--handle-color);
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: grab;
            z-index: 20;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .handle:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.2); }

        /* Custom Image Upload */
        .upload-section {
            border-top: 2px solid var(--border);
            padding-top: 15px;
        }
        input[type="file"] { font-size: 0.8rem; }

        .footer-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }

        .footer-link a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px dotted var(--border);
            padding: 8px;
        }
            
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Clip-Path Generator</h2>

        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">
            DARK MODE
        </button>
        <div>
            <label>Presets:</label>
            <div class="presets">
                <button onclick="setShape('triangle')">Triangle</button>
                <button onclick="setShape('trapezoid')">Trapezoid</button>
                <button onclick="setShape('hexagon')">Hexagon</button>
                <button onclick="setShape('circle')">Circle</button>
                <button onclick="setShape('message')">Message</button>
                <button onclick="setShape('cross')">Cross</button>
            </div>
        </div>

        <div class="code-output">
            <label>CSS Output:</label>
            <div class="code-box" id="css-code">
                clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            </div>
            <button class="copy-btn" id="btn-copy">Copy to Clipboard</button>
        </div>

        <div class="upload-section">
            <label>Background Image:</label>
            <input type="file" id="bg-upload" accept="image/*">
            <p style="font-size: 0.8rem; color: #aaa;">Upload an image to test the clip-path on real content.</p>
        </div>
    </div>

    <div class="workspace" id="workspace">
        <div class="demo-box" id="target-element">
            </div>
    </div>
    <footer class="footer-link">
        <a href="../../index.html">← Back to Home</a>
    </footer>
    <script src="clip-logic.js"></script>
</body>
</html>
