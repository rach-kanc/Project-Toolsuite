<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Trimmer & Visualizer</title>
    <meta property="og:title" content="Audio Trimmer - Project Toolsuite" />
    <meta property="og:description" content="Trim audio files quickly and securely with a browser-based audio editing tool." />
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Audio Trimmer - Project Toolsuite" />
    <meta name="twitter:description" content="Trim audio files quickly and securely with a browser-based audio editing tool." />
    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    
    <style>

        :root {
            --bg-color: var(--bg);
            --card-bg: var(--tag-bg);
            --text-color: var(--text);
            --accent-color: var(--text);
            --range-track: var(--border);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;

            background: var(--bg);
            border: 2px solid var(--border);

            padding: 24px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            padding: 40px 20px;

            background: var(--bg);

            transition: all 0.2s ease;
        }

        .upload-area:hover {
            background: var(--tag-bg);
            transform: translateY(-2px);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            color: var(--text);
        }

        p.desc {
            color: var(--text);
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
            background: var(--card-bg);
        }

        .upload-area:hover {
            border-color: var(--border);
            background: var(--tag-bg);
        }

        /* Waveform Container */
        .waveform-wrapper {
            position: relative;
            width: 100%;
            height: 150px;
            background: var(--tag-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            border: 1px solid var(--border);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Time Selection Overlays */
        .trim-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }

        #overlay-left {
            left: 0;
            width: 0%;
            border-right: 2px solid var(--border);
        }

        #overlay-right {
            right: 0;
            width: 0%;
            border-left: 2px solid var(--border);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
            display: none;
        }

        .time-inputs {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-family: monospace;
            color: var(--accent-color);
        }

        button {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--tag-bg);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
            background: var(--text);
            color: var(--bg);
        }

        button:disabled {
            background-color: var(--tag-bg);
            color: var(--text);
            cursor: not-allowed;
            opacity: 0.5;
        }

        button.secondary {
            background-color: var(--tag-bg);
        }

        /* Range Sliders */
        input[type=range] {
            width: 100%;
            margin: 0;
            background: transparent;
            -webkit-appearance: none;
            position: absolute;
            bottom: -10px;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Custom Range Thumbs to allow double-slider effect */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            pointer-events: auto;
            margin-top: -8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        .slider-container {
            position: relative;
            height: 5px;
            background: var(--range-track);
            width: 100%;
            margin-top: 10px;
            display: none;
        }
         .backtohome{
            height:20vh;
            width:100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
         }
        .back-home{
            color: var(--text);
            margin-top: 10px;
            text-decoration: none;
        }
        a:hover{
            text-decoration: underline dotted black;
        }

        footer {
            margin-top: 20px;
        }

        footer a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px dotted var(--border);
        }

        footer a:hover {
            opacity: 0.8;
        }

    
    </style>
</head>
<body>

    <div class="container">
        <h1>Audio Trimmer</h1>
        <button class="dark-mode-toggle"
            onclick="toggleTheme()"
            id="themeBtn">
            DARK MODE
        </button>
        <p class="desc">Trim audio files securely in your browser. No server uploads.</p>

        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Click to Upload Audio (MP3/WAV)</p>
            <input type="file" id="file-input" accept="audio/*" style="display: none;">
        </div>

        <div class="waveform-wrapper" id="waveform-ui">
            <canvas id="waveform-canvas"></canvas>
            <div id="overlay-left" class="trim-overlay"></div>
            <div id="overlay-right" class="trim-overlay"></div>
        </div>

        <div class="slider-container" id="slider-ui">
            <input type="range" id="start-slider" min="0" max="100" value="0" step="0.1">
            <input type="range" id="end-slider" min="0" max="100" value="100" step="0.1">
        </div>

        <div class="controls" id="controls-ui">
            <div class="time-inputs">
                <span id="start-time-display">Start: 0.0s</span>
                <span id="duration-display">Duration: 0.0s</span>
                <span id="end-time-display">End: 0.0s</span>
            </div>
            <button id="btn-preview" class="secondary">▶ Preview Trim</button>
            <button id="btn-download">💾 Download Trimmed WAV</button>
        </div>
    </div>

    <footer>
        <a href="../../index.html">&larr; Back to Home</a>
    </footer>
    <script src="audio-logic.js"></script>
</body>
</html>
